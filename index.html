<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abducktion</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Abducktion" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./modal.css" />
</head>
<body>

<!-- ══ SPLASH ══════════════════════════════════════════ -->
<div id="page-splash" class="page active">
  <h1 class="splash-title">Abducktion</h1>
  <div class="splash-scene" aria-hidden="true">
    <div class="splash-ufo-group">
      <img class="splash-ufo-img" src="images/transparent/ufo.png" alt="">
      <div class="splash-beam"></div>
    </div>
    <div class="splash-duck-wrap">
      <img class="splash-duck" src="images/mallard.png" alt="">
    </div>
  </div>
  <button class="btn-primary" id="btn-start">Start Game</button>
</div>

<!-- ══ GAME ════════════════════════════════════════════ -->
<div id="page-game" class="page">

  <div class="game-layout">

    <!-- Staging — label hidden; UFO image is the visual for this area -->
    <div class="staging-area" id="staging-area"></div>

    <!-- Goals -->
    <div class="goal-area">
      <div class="area-label">Goals</div>
      <div class="goal-cards-row" id="goal-cards-row"></div>
    </div>

    <!-- Actions list -->
    <div class="action-area" id="action-area">
      <div class="area-label">Actions</div>
    </div>

    <!-- Active action expanded view (replaces action-area when an action is selected) -->
    <div class="action-detail" id="action-detail" hidden>
      <button class="action-detail-back" id="action-detail-back">&#x2190; Cancel</button>
      <div class="action-detail-graphic" id="action-detail-graphic"></div>
      <div class="action-detail-info">
        <div class="action-detail-name" id="action-detail-name"></div>
        <div class="action-detail-desc" id="action-detail-desc"></div>
        <div class="action-detail-controls" id="action-detail-controls"></div>
      </div>
    </div>

    <!-- Board -->
    <div class="board-area">
      <div class="board-grid" id="board-grid"></div>
    </div>

  </div>

</div>

<!-- ══ GOAL MODAL ══════════════════════════════════════ -->
<div id="goal-modal" class="goal-modal-backdrop">
  <div class="goal-modal-card">
    <button class="goal-modal-close" id="goal-modal-close">&#x2715;</button>
    <div class="goal-modal-name"  id="goal-modal-name"></div>
    <div class="goal-modal-pts"   id="goal-modal-pts"></div>
    <div class="goal-modal-pattern" id="goal-modal-pattern"></div>
    <div class="goal-modal-desc"  id="goal-modal-desc"></div>
  </div>
</div>

<!-- ══ PROGRESS MODAL ══════════════════════════════════ -->
<div id="progress-modal" class="goal-modal-backdrop">
  <div class="progress-modal-card">
    <button class="goal-modal-close" id="progress-modal-close">&#x2715;</button>
    <div class="progress-modal-score" id="progress-modal-score">0 pts</div>
    <div class="progress-modal-body">
      <ol class="progress-goal-list" id="progress-goal-list"></ol>
      <div class="progress-visual" id="progress-visual">
        <img class="progress-ufo-img" src="images/transparent/ufo.png" alt="UFO">
      </div>
    </div>
  </div>
</div>

<!-- ══ RESULTS ═════════════════════════════════════════ -->
<div id="page-results" class="page">
  <h2 class="results-title">Game Over</h2>
  <div class="results-score" id="results-score">0 pts</div>

  <div class="results-stats">
    <div class="stat-card">
      <div class="stat-value" id="results-goals">0</div>
      <div class="stat-label">Goals matched</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="results-actions">0</div>
      <div class="stat-label">Actions used</div>
    </div>
  </div>

  <button class="btn-primary" id="btn-play-again">Play Again</button>
</div>

<script src="./script.js"></script>
<script src="./game.js"></script>
<script src="./app.js"></script>
</body>
</html>
